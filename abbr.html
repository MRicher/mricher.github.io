<!doctype html>
<html class="no-js" lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Abbreviations – RCMP</title>
  <!-- Already on rcmp.ca — remove when embedding -->
  <link rel="stylesheet" href="https://www.canada.ca/etc/designs/canada/wet-boew/css/theme.min.css" />
</head>
<body vocab="http://schema.org/" typeof="WebPage">

  <!-- ═══ EMBED START ═══ -->

  <h2>Abbreviations — <abbr title="Royal Canadian Mounted Police">RCMP</abbr></h2>

  <table
    id="abbr-table"
    class="wb-tables table table-striped table-hover"
    data-wb-tables='{
      "paging"     : true,
      "pageLength" : 20,
      "order"      : [[0, "asc"]],
      "columns"    : [
        { "orderable": true  },
        { "orderable": false },
        { "orderable": true  }
      ]
    }'
  >
    <caption class="wb-inv">Government of Canada English abbreviations with links to French equivalents</caption>
    <thead>
      <tr>
        <th scope="col">English abbreviation</th>
        <th scope="col">Full English form</th>
        <th scope="col">French abbreviation</th>
      </tr>
    </thead>
    <tbody id="abbr-tbody"></tbody>
  </table>

  <script>
  (function () {
    /* Update this to the actual French page URL on rcmp.ca */
    var FR_PAGE = "/fr/abreviations";

    var DATA = [
      { en:"AAFC",    fr:"AAC",     titleEn:"Agriculture and Agri-Food Canada",                                prev:[{en:"Agr",   titleEn:"Agriculture Canada"}] },
      { en:"CATSA",   fr:"ACSTA",   titleEn:"Canadian Air Transport Security Authority",                       prev:[] },
      { en:"CBSA",    fr:"ASFC",    titleEn:"Canada Border Services Agency",                                   prev:[{en:"CCRA",  titleEn:"Canada Customs and Revenue Agency"},{en:"RC",titleEn:"Revenue Canada"}] },
      { en:"CDS",     fr:"CESD",    titleEn:"Commissioner of the Environment and Sustainable Development",     prev:[] },
      { en:"CEAA",    fr:"ACEE",    titleEn:"Canadian Environmental Assessment Agency",                        prev:[{en:"FEARO", titleEn:"Federal Environmental Assessment Review Office"}] },
      { en:"CFIA",    fr:"ACIA",    titleEn:"Canadian Food Inspection Agency",                                 prev:[] },
      { en:"CIRNAC",  fr:"RCAANC",  titleEn:"Crown-Indigenous Relations and Northern Affairs Canada",          prev:[{en:"INAC",  titleEn:"Indian and Northern Affairs Canada"},{en:"AANDC",titleEn:"Aboriginal Affairs and Northern Development Canada"}] },
      { en:"CRTC",    fr:"CRTC",    titleEn:"Canadian Radio-television and Telecommunications Commission",     prev:[{en:"BBG",   titleEn:"Board of Broadcast Governors"}] },
      { en:"CSE",     fr:"CST",     titleEn:"Communications Security Establishment",                           prev:[] },
      { en:"CSIS",    fr:"SCRS",    titleEn:"Canadian Security Intelligence Service",                          prev:[] },
      { en:"CTA",     fr:"OTC",     titleEn:"Canadian Transportation Agency",                                  prev:[{en:"NTA",   titleEn:"National Transportation Agency"}] },
      { en:"DFO",     fr:"MPO",     titleEn:"Fisheries and Oceans Canada",                                     prev:[{en:"DOF",   titleEn:"Department of Fisheries"}] },
      { en:"DND",     fr:"MDN",     titleEn:"Department of National Defence",                                  prev:[] },
      { en:"ECCC",    fr:"ECCC",    titleEn:"Environment and Climate Change Canada",                           prev:[{en:"EC",    titleEn:"Environment Canada"}] },
      { en:"ESDC",    fr:"EDSC",    titleEn:"Employment and Social Development Canada",                        prev:[{en:"HRSDC", titleEn:"Human Resources and Skills Development Canada"},{en:"HRDC",titleEn:"Human Resources Development Canada"}] },
      { en:"Finance", fr:"Finances",titleEn:"Department of Finance Canada",                                    prev:[] },
      { en:"GAC",     fr:"AMC",     titleEn:"Global Affairs Canada",                                           prev:[{en:"DFATD", titleEn:"Foreign Affairs, Trade and Development Canada"},{en:"DFAIT",titleEn:"Foreign Affairs and International Trade Canada"}] },
      { en:"HC",      fr:"SC",      titleEn:"Health Canada",                                                   prev:[{en:"NHW",   titleEn:"National Health and Welfare"}] },
      { en:"IAAC",    fr:"AEIC",    titleEn:"Impact Assessment Agency of Canada",                              prev:[{en:"CEAA",  titleEn:"Canadian Environmental Assessment Agency"}] },
      { en:"ISED",    fr:"ISDE",    titleEn:"Innovation, Science and Economic Development Canada",             prev:[{en:"IC",    titleEn:"Industry Canada"}] },
      { en:"ISC",     fr:"SAC",     titleEn:"Indigenous Services Canada",                                      prev:[{en:"INAC",  titleEn:"Indian and Northern Affairs Canada"}] },
      { en:"JUS",     fr:"JUS",     titleEn:"Department of Justice Canada",                                    prev:[] },
      { en:"LAC",     fr:"BAC",     titleEn:"Library and Archives Canada",                                     prev:[{en:"NAC",   titleEn:"National Archives of Canada"}] },
      { en:"NRCan",   fr:"RNCan",   titleEn:"Natural Resources Canada",                                        prev:[{en:"EMR",   titleEn:"Energy, Mines and Resources"}] },
      { en:"NSERC",   fr:"CRSNG",   titleEn:"Natural Sciences and Engineering Research Council of Canada",     prev:[] },
      { en:"NRC",     fr:"CNRC",    titleEn:"National Research Council Canada",                                prev:[] },
      { en:"OAG",     fr:"BVG",     titleEn:"Office of the Auditor General of Canada",                         prev:[] },
      { en:"PCH",     fr:"PCH",     titleEn:"Canadian Heritage",                                               prev:[] },
      { en:"PCO",     fr:"BCP",     titleEn:"Privy Council Office",                                            prev:[] },
      { en:"PMO",     fr:"CPM",     titleEn:"Prime Minister's Office",                                         prev:[] },
      { en:"PS",      fr:"SP",      titleEn:"Public Safety Canada",                                            prev:[{en:"SG",    titleEn:"Solicitor General Canada"}] },
      { en:"PSC",     fr:"CFP",     titleEn:"Public Service Commission of Canada",                             prev:[] },
      { en:"PSPC",    fr:"SPAC",    titleEn:"Public Services and Procurement Canada",                          prev:[{en:"PWGSC", titleEn:"Public Works and Government Services Canada"}] },
      { en:"SSC",     fr:"SSC",     titleEn:"Shared Services Canada",                                          prev:[] },
      { en:"StatCan", fr:"StatCan", titleEn:"Statistics Canada",                                               prev:[{en:"DBS",   titleEn:"Dominion Bureau of Statistics"}] },
      { en:"TC",      fr:"TC",      titleEn:"Transport Canada",                                                prev:[{en:"DOT",   titleEn:"Department of Transport"}] },
      { en:"TBS",     fr:"SCT",     titleEn:"Treasury Board of Canada Secretariat",                            prev:[] },
      { en:"VAC",     fr:"ACC",     titleEn:"Veterans Affairs Canada",                                         prev:[{en:"DVA",   titleEn:"Department of Veterans Affairs"}] },
      { en:"WEDA",    fr:"ADEO",    titleEn:"Western Economic Diversification Agency",                         prev:[{en:"WD",    titleEn:"Western Economic Diversification Canada"}] },
    ];

    function esc(s) {
      return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function prevHtml(prev) {
      if (!prev.length) return "";
      var items = prev.map(function (p) {
        return "<dt>" + esc(p.en) + "</dt><dd>" + esc(p.titleEn) + "</dd>";
      }).join("");
      return "<p><strong>Previously known as</strong></p><dl>" + items + "</dl>";
    }

    document.getElementById("abbr-tbody").innerHTML = DATA.map(function (r) {
      var anchor = FR_PAGE + "#" + r.fr;
      return "<tr>" +
        "<td>" + esc(r.en) + "</td>" +
        "<td>" + esc(r.titleEn) + prevHtml(r.prev) + "</td>" +
        "<td><a href='" + anchor + "' lang='fr' hreflang='fr'>" + esc(r.fr) + "</a></td>" +
        "</tr>";
    }).join("");
  }());
  </script>

  <!-- ═══ EMBED END ═══ -->

  <!-- Already on rcmp.ca — remove when embedding -->
  <script src="https://www.canada.ca/etc/designs/canada/wet-boew/js/wet-boew.min.js"></script>
</body>
</html>
