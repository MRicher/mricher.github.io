<!doctype html>

    <style>
      :root {
        --gc-navy: #26374a;
        --gc-red: #af3c43;
        --gc-focus: #ffbf47;
        --gc-border: rgba(0, 0, 0, 0.1);
        --gc-stripe: rgba(0, 0, 0, 0.025);
        --gc-hover: rgba(43, 67, 128, 0.05);
        --gc-font: "Noto Sans", "Helvetica Neue", Arial, sans-serif;
        --gc-link: #2b4380;
        --gc-link-visited: #7834bc;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      .wrap {
        font-family: var(--gc-font);
        padding: 1.5rem 0 3rem;
        color: var(--color-text-primary);
      }
      .hd-bar {
        border-left: 4px solid var(--gc-red);
        padding-left: 0.9rem;
        margin-bottom: 1.5rem;
        border-radius: 0;
      }
      .hd-bar h2 {
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--gc-navy);
        line-height: 1.25;
      }
      .hd-bar p {
        font-size: 0.8rem;
        color: var(--color-text-secondary);
        margin-top: 0.25rem;
      }
      .controls {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 0.9rem;
      }
      .sw {
        position: relative;
      }
      .sw svg {
        position: absolute;
        left: 11px;
        top: 50%;
        transform: translateY(-50%);
        width: 14px;
        height: 14px;
        fill: var(--color-text-secondary);
        pointer-events: none;
      }
      input[type="search"].gs {
        width: 100%;
        padding: 0.6rem 1rem 0.6rem 2.2rem;
        font-size: 0.875rem;
        font-family: var(--gc-font);
        border: 1.5px solid var(--gc-border);
        border-radius: 6px;
        background: var(--color-background-primary);
        color: var(--color-text-primary);
      }
      input[type="search"].gs:focus {
        outline: 3px solid var(--gc-focus);
        outline-offset: 0;
        border-color: var(--gc-navy);
      }
      .pills {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .pill {
        padding: 0.32rem 0.75rem;
        font-size: 0.76rem;
        font-family: var(--gc-font);
        font-weight: 500;
        border: 1.5px solid var(--gc-border);
        border-radius: 20px;
        background: var(--color-background-primary);
        color: var(--color-text-primary);
        cursor: pointer;
      }
      .pill:focus {
        outline: 3px solid var(--gc-focus);
        outline-offset: 1px;
      }
      .pill.on {
        background: var(--gc-navy);
        border-color: var(--gc-navy);
        color: #fff;
      }
      .cnt {
        font-size: 0.78rem;
        color: var(--color-text-secondary);
        margin-bottom: 0.6rem;
      }
      .cnt strong {
        color: var(--gc-navy);
        font-weight: 500;
      }

      .card-list {
        border: 1px solid var(--gc-border);
        border-radius: 8px;
        overflow: hidden;
      }
      .ci {
        padding: 0.9rem 1rem;
        border-bottom: 1px solid var(--gc-border);
        background: var(--color-background-primary);
        transition: background 0.1s;
      }
      .ci:last-child {
        border-bottom: none;
      }
      .ci:nth-child(even) {
        background: var(--gc-stripe);
      }
      .ci:hover {
        background: var(--gc-hover);
      }

      .row-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 0.45rem;
      }
      .abbr-block {
      }
      .abbr-current {
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--gc-navy);
        letter-spacing: 0.01em;
        line-height: 1.2;
      }
      .abbr-current-fr {
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--gc-red);
        letter-spacing: 0.01em;
        line-height: 1.2;
      }
      .abbr-sep {
        color: var(--color-text-secondary);
        font-weight: 400;
        margin: 0 5px;
        font-size: 0.85rem;
      }
      .abbr-pair-row {
        display: flex;
        align-items: baseline;
        flex-wrap: wrap;
        gap: 0;
      }

      .title-en {
        font-size: 0.9rem;
        font-weight: 500;
        color: var(--color-text-primary);
        line-height: 1.4;
        margin-bottom: 2px;
      }
      .title-fr {
        font-size: 0.82rem;
        color: var(--color-text-secondary);
        font-style: italic;
        line-height: 1.4;
        margin-bottom: 0.55rem;
      }

      .legacy-block {
        border-top: 1px dashed var(--gc-border);
        padding-top: 0.5rem;
        margin-top: 0.1rem;
      }
      .legacy-label {
        font-size: 0.68rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--color-text-secondary);
        margin-bottom: 0.3rem;
      }
      .legacy-item {
        display: flex;
        align-items: baseline;
        flex-wrap: wrap;
        gap: 3px 6px;
        margin-bottom: 0.3rem;
      }
      .legacy-item:last-child {
        margin-bottom: 0;
      }
      .lg-abbr {
        font-size: 0.82rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        text-decoration-color: var(--gc-border);
      }
      .lg-sep {
        font-size: 0.75rem;
        color: var(--color-text-secondary);
        opacity: 0.6;
        flex-shrink: 0;
      }
      .lg-arrow {
        font-size: 0.75rem;
        color: var(--color-text-secondary);
        opacity: 0.55;
        flex-shrink: 0;
        padding: 0 2px;
      }
      .lg-link {
        font-size: 0.82rem;
        color: var(--gc-link);
        text-decoration: underline;
        cursor: pointer;
        background: none;
        border: none;
        font-family: var(--gc-font);
        padding: 0;
        font-weight: 500;
      }
      .lg-link:hover {
        color: var(--gc-navy);
      }
      .lg-link:focus {
        outline: 3px solid var(--gc-focus);
        outline-offset: 1px;
        border-radius: 2px;
      }
      .lg-title {
        font-size: 0.78rem;
        color: var(--color-text-secondary);
        font-style: italic;
      }

      .no-results {
        text-align: center;
        padding: 2.5rem 1rem;
        color: var(--color-text-secondary);
        font-size: 0.9rem;
        border: 1px solid var(--gc-border);
        border-radius: 8px;
      }

      @media (min-width: 600px) {
        .controls {
          flex-direction: row;
          align-items: center;
        }
        .sw {
          flex: 1;
        }
        .ci {
          padding: 0.85rem 1.25rem;
        }
      }
      @media (min-width: 900px) {
        table.dt {
          width: 100%;
          border-collapse: collapse;
          border: 1px solid var(--gc-border);
          border-radius: 8px;
          overflow: hidden;
          font-family: var(--gc-font);
          font-size: 0.875rem;
        }
        table.dt thead th {
          background: var(--gc-navy);
          color: #fff;
          font-size: 0.72rem;
          font-weight: 600;
          letter-spacing: 0.055em;
          text-transform: uppercase;
          padding: 0.75rem 1rem;
          text-align: left;
          white-space: nowrap;
          cursor: pointer;
          user-select: none;
        }
        table.dt thead th:focus {
          outline: 3px solid var(--gc-focus);
          outline-offset: -3px;
        }
        table.dt thead th .si {
          display: inline-block;
          margin-left: 4px;
          opacity: 0.5;
          font-size: 0.62rem;
        }
        table.dt thead th.asc .si::after {
          content: "▲";
          opacity: 1;
        }
        table.dt thead th.desc .si::after {
          content: "▼";
          opacity: 1;
        }
        table.dt thead th:not(.asc):not(.desc) .si::after {
          content: "⇅";
        }
        table.dt tbody tr {
          border-bottom: 1px solid var(--gc-border);
        }
        table.dt tbody tr:last-child {
          border-bottom: none;
        }
        table.dt tbody tr:nth-child(even) td {
          background: var(--gc-stripe);
        }
        table.dt tbody tr:hover td {
          background: var(--gc-hover);
        }
        table.dt tbody td {
          padding: 0.75rem 1rem;
          vertical-align: top;
          color: var(--color-text-primary);
        }
        .col-abbr {
          width: 14%;
        }
        .col-en {
          width: 30%;
        }
        .col-fr {
          width: 30%;
        }
        .col-leg {
          width: 26%;
        }
        .dt-legacy-item {
          display: flex;
          align-items: baseline;
          flex-wrap: wrap;
          gap: 2px 5px;
          margin-bottom: 0.3rem;
          font-size: 0.78rem;
        }
        .dt-legacy-item:last-child {
          margin-bottom: 0;
        }
      }
    </style>
    <title></title>
  </head>
  <body>
    <div class="wrap" role="main">
      <div class="hd-bar">
        <h2>Abbreviations</h2>
        <p><abbr>RCMP</abbr></p>
      </div>
      <div class="controls">
        <div class="sw" role="search">

          </svg>
          <input aria-label="Search abbreviations and titles" class="gs" id="q" oninput="render()" placeholder="Search" type="search" />
        </div>
        <div aria-label="Sort order" class="pills" role="group">
          <button aria-pressed="true" class="pill on" onclick="setSort('en', this)">Sort English</button>
          <button aria-pressed="false" class="pill" onclick="setSort('fr', this)">Sort French</button>
        </div>
      </div>
      <p aria-atomic="true" aria-live="polite" class="cnt" id="cnt"></p>
      <div aria-label="Abbreviations" id="list" role="region"></div>
    </div>

      let sortKey = "en";

      function setSort(k, btn) {
        sortKey = k;
        document.querySelectorAll(".pill").forEach((b) => {
          b.classList.remove("on");
          b.setAttribute("aria-pressed", "false");
        });
        btn.classList.add("on");
        btn.setAttribute("aria-pressed", "true");
        render();
      }

      function hl(text, q) {
        if (!q || !text) return text;
        const re = new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "gi");
        return text.replace(re, '<mark style="background:#ffbf47;color:#1a1a1a;border-radius:2px;padding:0 1px">$1<\/mark>');
      }

      function scrollTo(id) {
        const el = document.getElementById("row-" + id);
        if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
      }

      function render() {
        const q = (document.getElementById("q").value || "").trim().toLowerCase();
        let rows = DATA.filter((r) => {
          if (!q) return true;
          const fields = [r.en, r.fr, r.titleEn, r.titleFr, ...r.prev.flatMap((p) => [p.en, p.fr, p.titleEn, p.titleFr])];
          return fields.some((v) => v && v.toLowerCase().includes(q));
        });
        rows.sort((a, b) => a[sortKey].localeCompare(b[sortKey]));
        document.getElementById("cnt").innerHTML = "Showing <strong>" + rows.length + "<\/strong> of <strong>" + DATA.length + "<\/strong>";

        const isDesktop = window.innerWidth >= 900;

        if (!rows.length) {
          document.getElementById("list").innerHTML = '<div class="no-results">No results found · Aucun résultat trouvé<\/div>';
          return;
        }

        if (isDesktop) {
          const ths = [
            { label: "Abbreviation EN / FR", key: "en" },
            { label: "English full title", key: "titleEn" },
            { label: "French full title", key: null },
            { label: "Previous", key: null },
          ]
            .map((c) => {
              const cls = c.key && sortKey === c.key ? "asc" : "";
              const si = c.key ? '<span class="si" aria-hidden="true"><\/span>' : "";
              const tab = c.key ? 'tabindex="0"' : "";
              const click = c.key
                ? `onclick="setSort('${c.key}',this)" onkeydown="if(event.key==='Enter'||event.key===' ')setSort('${c.key}',this)"`
                : "";
              return `<th scope="col" class="${cls}" ${tab} ${click}>${c.label}${si}<\/th>`;
            })
            .join("");

          const trs = rows
            .map((r) => {
              const legHtml = r.prev.length
                ? r.prev
                    .map((p) => {
                      const currentIdx = rows.indexOf(r);
                      return `<div class="dt-legacy-item">
	         <dl>
				<dt>${hl(p.en, q)}<\/dt>
				<dd>${hl(p.titleEn, q)}<\/dd>
			</dl>`;
                    })
                    .join("")
                : "—";

              return `<tr id="row-${r.en}">
	       <td class="col-abbr">
	         <div><abbr>${hl(r.en, q)}<\/abbr><\/div>
	         <div><abbr><i lang"fr">${hl(r.fr, q)}<\/i><\/abbr><\/div>
	       <\/td>
	       <td class="col-en">${hl(r.titleEn, q)}<\/td>
	       <td class="col-fr"><i lang="fr">${hl(r.titleFr, q)}<\/i><\/td>
	       <td class="col-leg">${legHtml}<\/td>
	     <\/tr>`;
            })
            .join("");

          document.getElementById("list").innerHTML = `<table class="dt" aria-label="Government of Canada bilingual abbreviations">
	     <caption style="position:absolute;left:-9999px">Bilingual abbreviations with legacy references<\/caption>
	     <thead><tr>${ths}<\/tr><\/thead>
	     <tbody>${trs}<\/tbody>
	   <\/table>`;
        } else {
          const cards = rows
            .map((r) => {
              const legHtml = r.prev.length
                ? `
	       <div class="legacy-block">
	         <div class="legacy-label">Previously<\/div>
	         ${r.prev
             .map(
               (p) => `
	           <div class="legacy-item">
	             <span class="lg-abbr">${hl(p.en, q)}<\/span>
	           <\/div>
	           <div class="lg-title">${hl(p.titleEn, q)}<\/div>
	         `,
             )
             .join("")}
	       <\/div>`
                : "";
              return `<div class="ci" id="row-${r.en}">
	       <div class="abbr-pair-row" style="margin-bottom:.4rem">
	         <span class="abbr-current">${hl(r.en, q)}<\/span>
	         <span class="abbr-sep">/<\/span>
	         <span class="abbr-current-fr">${hl(r.fr, q)}<\/span>
	       <\/div>
	       <div class="title-en">${hl(r.titleEn, q)}<\/div>
	       <div class="title-fr">${hl(r.titleFr, q)}<\/div>
	       ${legHtml}
	     <\/div>`;
            })
            .join("");
          document.getElementById("list").innerHTML = `<div class="card-list">${cards}<\/div>`;
        }
      }

      window.addEventListener("resize", render);
      render();
    </script>
  </body>
</html>
