    function esc(s) {
      return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function prevEnHtml(prev) {
      if (!prev.length) return "";
      var items = prev.map(function (p) {
        return "<dt>" + esc(p.en) + "</dt><dd>" + esc(p.titleEn) + "</dd>";
      }).join("");
      return "<p><strong>Previously known as</strong></p><dl>" + items + "</dl>";
    }

    function prevFrHtml(prev) {
      if (!prev.length) return "";
      var items = prev.map(function (p) {
        return "<dt>" + esc(p.fr) + "</dt><dd>" + esc(p.titleFr) + "</dd>";
      }).join("");
      return "<p><strong>Previously known as</strong></p><dl>" + items + "</dl>";
    }

    document.getElementById("abbr-tbody").innerHTML = DATA.map(function (r) {
      return "<tr>" +
        "<td>" + esc(r.en) + "</td>" +
        "<td>" + esc(r.titleEn) + prevEnHtml(r.prev) + "</td>" +
        "<td>" + esc(r.fr)  + "</td>" +
        "<td>" + esc(r.titleFr) + prevFrHtml(r.prev) + "</td>" +
        "</tr>";
    }).join("");
