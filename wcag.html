<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Beautifier & WCAG Auditor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --panel: #16161f;
      --border: #2a2a3a;
      --accent: #7c6af7;
      --accent2: #40e0c8;
      --accent3: #f7a26a;
      --text: #e8e8f0;
      --muted: #7070a0;
      --error: #f06a7a;
      --warn: #f7c26a;
      --ok: #6af7aa;
      --radius: 10px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .logo h1 {
      font-size: 17px; font-weight: 800; letter-spacing: -0.3px;
      background: linear-gradient(90deg, var(--text), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .header-meta {
      font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace;
    }

    /* ── LAYOUT ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 16px;
      border: none; border-radius: var(--radius);
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all .15s;
      letter-spacing: .2px;
    }

    .btn-primary {
      background: var(--accent); color: #fff;
    }
    .btn-primary:hover { background: #9080ff; transform: translateY(-1px); }

    .btn-ghost {
      background: var(--panel); color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    .btn-copy {
      background: var(--panel); color: var(--accent2);
      border: 1px solid var(--border);
      margin-left: auto;
    }
    .btn-copy:hover { border-color: var(--accent2); }

    .sep { width: 1px; height: 24px; background: var(--border); }

    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace;
    }
    .badge-ok   { background: #0a2a1a; color: var(--ok);   border: 1px solid #1a4a2a; }
    .badge-warn { background: #2a200a; color: var(--warn); border: 1px solid #4a380a; }
    .badge-err  { background: #2a0a0f; color: var(--error);border: 1px solid #4a1a1f; }
    .badge-info { background: #0a0a2a; color: var(--accent);border: 1px solid #1a1a4a; }

    /* ── EDITORS ── */
    .editors {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      flex: 1;
      overflow: hidden;
    }

    .pane {
      display: flex; flex-direction: column;
      border: 1px solid var(--border);
      border-top: none;
      overflow: hidden;
    }
    .pane:first-child { border-left: none; border-right: none; }
    .pane:last-child  { border-right: none; }

    .pane-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .pane-title {
      font-size: 11px; font-weight: 600; letter-spacing: .8px;
      text-transform: uppercase; color: var(--muted);
    }

    textarea, .output-area {
      flex: 1; width: 100%;
      background: var(--bg);
      color: var(--text);
      border: none; outline: none; resize: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; line-height: 1.7;
      padding: 16px;
      overflow: auto;
    }

    textarea::placeholder { color: #3a3a5a; }

    .output-area {
      white-space: pre;
      tab-size: 2;
    }

    /* ── WCAG PANEL ── */
    .wcag-panel {
      width: 300px; min-width: 300px;
      display: flex; flex-direction: column;
      border-left: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden;
      flex-shrink: 0;
    }

    .wcag-header {
      padding: 10px 14px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .wcag-title { font-size: 11px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--accent); }

    .wcag-body { flex: 1; overflow-y: auto; padding: 10px; }

    .wcag-issue {
      padding: 9px 11px;
      border-radius: 7px;
      margin-bottom: 7px;
      border-left: 3px solid;
      font-size: 12px; line-height: 1.5;
      animation: slideIn .2s ease;
    }
    @keyframes slideIn { from { opacity:0; transform:translateX(6px) } to { opacity:1; transform:translateX(0) } }

    .wcag-issue.error  { background: #1a0a10; border-color: var(--error); }
    .wcag-issue.warn   { background: #1a1500; border-color: var(--warn); }
    .wcag-issue.pass   { background: #0a1a10; border-color: var(--ok); }

    .wcag-issue-title {
      font-weight: 700; margin-bottom: 2px; display: flex; align-items: center; gap: 6px;
    }
    .wcag-issue.error .wcag-issue-title { color: var(--error); }
    .wcag-issue.warn  .wcag-issue-title { color: var(--warn); }
    .wcag-issue.pass  .wcag-issue-title { color: var(--ok); }

    .wcag-issue-ref {
      font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace;
    }
    .wcag-issue-desc { color: #c0c0d8; margin-top: 2px; }

    .wcag-empty { text-align: center; padding: 30px 10px; color: var(--muted); font-size: 13px; }

    .main-area {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .editors-wrap { display: flex; flex: 1; flex-direction: column; overflow: hidden; }
    .editors { flex: 1; }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 6px 14px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
    }

    .stat { display: flex; align-items: center; gap: 4px; }
    .stat span { color: var(--text); font-weight: 600; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ── FLASH ── */
    @keyframes flash { 0%,100%{opacity:1} 50%{opacity:.3} }
    .flashing { animation: flash .4s; }

    /* ── LINE NUMBERS ── */
    .code-wrapper { display: flex; flex: 1; overflow: auto; }
    .line-nums {
      padding: 16px 10px 16px 16px;
      background: var(--bg);
      color: #3a3a5a;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; line-height: 1.7;
      text-align: right;
      user-select: none;
      border-right: 1px solid #1e1e2e;
      min-width: 44px;
      flex-shrink: 0;
    }
    .code-out {
      flex: 1;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; line-height: 1.7;
      padding: 16px;
      white-space: pre;
      overflow: auto;
    }

    /* Syntax highlight */
    .hl-tag   { color: #7c9cf7; }
    .hl-attr  { color: #f7a26a; }
    .hl-val   { color: #6af7aa; }
    .hl-cmt   { color: #4a4a7a; font-style: italic; }
    .hl-dt    { color: var(--accent2); }
  </style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">✦</div>
      <h1>HTML Beautifier</h1>
    </div>
    <div class="header-meta">WCAG 2.1 · 2-space indent · auto-format</div>
  </header>

  <div class="toolbar">
    <button class="btn btn-primary" onclick="beautify()" title="Beautify & audit (Ctrl+Enter)">
      ✦ Beautify
    </button>
    <button class="btn btn-ghost" onclick="clearAll()">✕ Clear</button>
    <button class="btn btn-ghost" onclick="loadSample()">⟳ Sample</button>
    <div class="sep"></div>
    <span id="badge-errors" class="badge badge-err" style="display:none"></span>
    <span id="badge-warns"  class="badge badge-warn" style="display:none"></span>
    <span id="badge-passes" class="badge badge-ok"   style="display:none"></span>
    <button class="btn btn-copy" onclick="copyOutput()" style="margin-left:auto">⎘ Copy</button>
  </div>

  <div class="main-area">
    <div class="editors-wrap">
      <div class="editors">
        <!-- INPUT -->
        <div class="pane">
          <div class="pane-header">
            <span class="pane-title">Input — Dirty HTML</span>
            <span id="in-chars" style="font-size:11px;color:var(--muted);font-family:monospace">0 chars</span>
          </div>
          <textarea id="input" placeholder="Paste your messy HTML here…" spellcheck="false" oninput="updateInputStats()"></textarea>
        </div>
        <!-- OUTPUT -->
        <div class="pane">
          <div class="pane-header">
            <span class="pane-title">Output — Clean HTML</span>
            <span id="out-lines" style="font-size:11px;color:var(--muted);font-family:monospace">0 lines</span>
          </div>
          <div class="code-wrapper">
            <div class="line-nums" id="line-nums">1</div>
            <div class="code-out" id="output" aria-label="Beautified HTML output"></div>
          </div>
        </div>
      </div>
      <div class="stats-bar">
        <div class="stat">Tags removed: <span id="stat-removed">0</span></div>
        <div class="stat">Attrs added: <span id="stat-added">0</span></div>
        <div class="stat">Issues: <span id="stat-issues">0</span></div>
        <div class="stat" style="margin-left:auto">Ctrl+Enter to beautify</div>
      </div>
    </div>

    <!-- WCAG PANEL -->
    <div class="wcag-panel">
      <div class="wcag-header">
        <span class="wcag-title">WCAG 2.1 Audit</span>
        <span id="wcag-count" style="font-size:11px;color:var(--muted)">—</span>
      </div>
      <div class="wcag-body" id="wcag-body">
        <div class="wcag-empty">Paste HTML and click<br><strong>Beautify</strong> to audit</div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── BEAUTIFIER ───────────────────────────────────────────────────────────────

const INDENT = '  '; // 2 spaces

// Tags that don't get their children indented on new lines
const INLINE_TAGS = new Set([
  'a','abbr','acronym','b','bdo','big','br','button','cite','code','dfn',
  'em','i','img','input','kbd','label','map','object','output','q','samp',
  'select','small','span','strong','sub','sup','textarea','time','tt','u','var'
]);

const VOID_TAGS = new Set([
  'area','base','br','col','embed','hr','img','input','link','meta',
  'param','source','track','wbr'
]);

const BLOCK_TAGS = new Set([
  'address','article','aside','blockquote','canvas','dd','details','dialog',
  'div','dl','dt','fieldset','figcaption','figure','footer','form','h1','h2',
  'h3','h4','h5','h6','header','hgroup','hr','li','main','nav','noscript',
  'ol','p','pre','section','summary','table','tbody','td','template','tfoot',
  'th','thead','title','tr','ul'
]);

function tokenize(html) {
  const tokens = [];
  const re = /<!--[\s\S]*?-->|<!DOCTYPE[^>]*>|<\/([a-zA-Z][^\s>]*)>|<([a-zA-Z][^\s>/]*)([^>]*)\/?>|([^<]+)/gi;
  let m;
  while ((m = re.exec(html)) !== null) {
    if (m[0].startsWith('<!--')) {
      tokens.push({ type: 'comment', value: m[0] });
    } else if (m[0].startsWith('<!DOCTYPE') || m[0].startsWith('<!doctype')) {
      tokens.push({ type: 'doctype', value: m[0] });
    } else if (m[1] !== undefined) {
      tokens.push({ type: 'close', tag: m[1].toLowerCase() });
    } else if (m[2] !== undefined) {
      const selfClosing = m[3].trim().endsWith('/') || VOID_TAGS.has(m[2].toLowerCase());
      tokens.push({ type: selfClosing ? 'void' : 'open', tag: m[2].toLowerCase(), attrs: m[3].trim() });
    } else if (m[4] !== undefined) {
      const t = m[4];
      if (t.trim()) tokens.push({ type: 'text', value: t });
    }
  }
  return tokens;
}

function parseAttrs(str) {
  const attrs = {};
  const re = /([a-zA-Z:_][a-zA-Z0-9:_\-.]*)(?:\s*=\s*(?:"([^"]*)"|'([^']*)'|(\S+)))?/g;
  let m;
  while ((m = re.exec(str)) !== null) {
    const key = m[1].toLowerCase();
    const val = m[2] ?? m[3] ?? m[4] ?? true;
    attrs[key] = val;
  }
  return attrs;
}

function serializeAttrs(attrs) {
  return Object.entries(attrs)
    .map(([k, v]) => v === true ? k : `${k}="${v}"`)
    .join(' ');
}

function formatTag(tag, attrs, closing = '') {
  const a = serializeAttrs(attrs);
  return a ? `<${tag} ${a}${closing}>` : `<${tag}${closing}>`;
}

// ─── WCAG 2.1 CHECKS ─────────────────────────────────────────────────────────

function auditTokens(tokens) {
  const issues = [];
  let seenLang = false, seenTitle = false, seenMain = false;
  let headingOrder = [], lastH = 0;
  const ids = {};
  let statsRemoved = 0, statsAdded = 0;

  tokens.forEach((tok, i) => {
    if (tok.type !== 'open' && tok.type !== 'void') return;

    const attrs = parseAttrs(tok.attrs || '');

    // ── 1.1.1 Non-text content: img alt ──
    if (tok.tag === 'img') {
      if (!attrs.alt && attrs.alt !== '') {
        issues.push({
          level: 'error', criterion: '1.1.1',
          title: 'Missing alt attribute',
          desc: `<img> tag lacks alt. Add alt="" for decorative or alt="description" for informative images.`
        });
        attrs.alt = '';
        statsAdded++;
      }
    }

    // ── 1.3.1 Info & Relationships: form labels ──
    if (tok.tag === 'input' && !['hidden','submit','reset','button','image'].includes(attrs.type || 'text')) {
      if (!attrs['aria-label'] && !attrs['aria-labelledby'] && !attrs.id) {
        issues.push({
          level: 'warn', criterion: '1.3.1',
          title: 'Input may lack label',
          desc: `<input type="${attrs.type||'text'}"> has no id for <label for>, aria-label, or aria-labelledby.`
        });
      }
    }

    // ── 1.3.5 Identify Input Purpose ──
    if (tok.tag === 'input' && ['email','tel','name','password'].includes(attrs.type || '')) {
      if (!attrs.autocomplete) {
        issues.push({
          level: 'warn', criterion: '1.3.5',
          title: 'Missing autocomplete',
          desc: `<input type="${attrs.type}"> should declare autocomplete for user benefit.`
        });
      }
    }

    // ── 2.4.1 Skip navigation ──
    if (tok.tag === 'body') {
      issues.push({ level: 'warn', criterion: '2.4.1', title: 'Verify skip nav', desc: 'Ensure a skip-to-content link exists at the top of the page.' });
    }

    // ── 2.4.2 Page titled ──
    if (tok.tag === 'title') seenTitle = true;

    // ── 2.4.6 Headings labeled ──
    const hMatch = tok.tag.match(/^h([1-6])$/);
    if (hMatch) {
      const level = parseInt(hMatch[1]);
      if (level > lastH + 1 && lastH !== 0) {
        issues.push({
          level: 'warn', criterion: '2.4.6',
          title: `Heading order skip h${lastH}→h${level}`,
          desc: `Heading levels should not skip. Went from <h${lastH}> to <h${level}>.`
        });
      }
      lastH = level;
    }

    // ── 2.5.3 Label in name: button without text ──
    if (['button','a'].includes(tok.tag)) {
      if (!attrs['aria-label'] && !attrs['aria-labelledby'] && !attrs.title) {
        // can't fully check text content in token stream, mild nudge
      }
    }

    // ── 3.1.1 Language of page ──
    if (tok.tag === 'html') {
      if (!attrs.lang) {
        issues.push({
          level: 'error', criterion: '3.1.1',
          title: 'Missing lang attribute on <html>',
          desc: 'Add lang="en" (or appropriate language code) to <html>.'
        });
        attrs.lang = 'en';
        statsAdded++;
      } else {
        seenLang = true;
      }
    }

    // ── 3.3.2 Labels or instructions ──
    if (tok.tag === 'input' && attrs.required === true) {
      if (!attrs['aria-required']) {
        attrs['aria-required'] = 'true';
        statsAdded++;
        issues.push({
          level: 'warn', criterion: '3.3.2',
          title: 'Added aria-required',
          desc: `<input required> now also has aria-required="true" for better AT support.`
        });
      }
    }

    // ── 4.1.1 Parsing: duplicate id ──
    if (attrs.id) {
      if (ids[attrs.id]) {
        issues.push({
          level: 'error', criterion: '4.1.1',
          title: `Duplicate id="${attrs.id}"`,
          desc: 'IDs must be unique within a document.'
        });
      }
      ids[attrs.id] = true;
    }

    // ── 4.1.2 Name, Role, Value: role on interactive ──
    if (tok.tag === 'div' || tok.tag === 'span') {
      if (attrs.onclick !== undefined && !attrs.role && !attrs.tabindex) {
        issues.push({
          level: 'error', criterion: '4.1.2',
          title: `Interactive <${tok.tag}> missing role/tabindex`,
          desc: `<${tok.tag} onclick="…"> should have role="button" tabindex="0" and keyboard handler.`
        });
      }
    }

    // ── target="_blank" safety ──
    if (tok.tag === 'a' && attrs.target === '_blank') {
      if (!attrs.rel || !attrs.rel.includes('noopener')) {
        issues.push({
          level: 'warn', criterion: '3.2.2',
          title: 'target="_blank" missing rel="noopener"',
          desc: 'Add rel="noopener noreferrer" to links that open new tabs.'
        });
        attrs.rel = 'noopener noreferrer';
        statsAdded++;
      }
    }

    tok._patchedAttrs = attrs;
  });

  // page-level checks
  if (!seenTitle) {
    issues.push({ level: 'error', criterion: '2.4.2', title: 'Missing <title>', desc: 'Every page must have a <title> element.' });
  }

  // passes
  if (seenLang) issues.unshift({ level: 'pass', criterion: '3.1.1', title: 'lang attribute present', desc: 'Good: <html lang="…"> found.' });
  if (seenTitle) issues.unshift({ level: 'pass', criterion: '2.4.2', title: '<title> present', desc: 'Good: page has a <title> element.' });

  return { issues, statsRemoved, statsAdded };
}

// ─── FORMAT ───────────────────────────────────────────────────────────────────

function formatHTML(tokens) {
  let out = '';
  let depth = 0;

  const pad = (d) => INDENT.repeat(Math.max(0, d));

  tokens.forEach((tok, i) => {
    const attrs = tok._patchedAttrs ? serializeAttrs(tok._patchedAttrs) : (tok.attrs || '');
    const attrStr = attrs ? ` ${attrs}` : '';

    switch (tok.type) {
      case 'doctype':
        out += `<!DOCTYPE html>\n`;
        break;
      case 'comment':
        out += `${pad(depth)}${tok.value}\n`;
        break;
      case 'open': {
        const inline = INLINE_TAGS.has(tok.tag);
        out += `${pad(depth)}<${tok.tag}${attrStr}>\n`;
        if (!inline) depth++;
        else depth++;
        break;
      }
      case 'void':
        out += `${pad(depth)}<${tok.tag}${attrStr}>\n`;
        break;
      case 'close': {
        const inline = INLINE_TAGS.has(tok.tag);
        depth = Math.max(0, depth - 1);
        out += `${pad(depth)}</${tok.tag}>\n`;
        break;
      }
      case 'text': {
        const clean = tok.value.replace(/\s+/g, ' ').trim();
        if (clean) out += `${pad(depth)}${clean}\n`;
        break;
      }
    }
  });

  return out.trimEnd();
}

// ─── SYNTAX HIGHLIGHT ────────────────────────────────────────────────────────

function highlight(html) {
  return html
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    // restore tag structure for highlighting
    .replace(/&lt;!DOCTYPE[^&]*&gt;/gi, m => `<span class="hl-dt">${m}</span>`)
    .replace(/&lt;!--[\s\S]*?--&gt;/g, m => `<span class="hl-cmt">${m}</span>`)
    .replace(/(&lt;\/?)([\w-]+)((?:\s[^&]*)?)(&gt;)/g, (_, open, tag, rest, close) => {
      const attrHL = rest.replace(/(\s[\w:-]+)(="[^"]*")?/g, (__, k, v) =>
        v ? `<span class="hl-attr">${k}</span>=<span class="hl-val">${v}</span>`
           : `<span class="hl-attr">${k}</span>`);
      return `<span class="hl-tag">${open}${tag}</span>${attrHL}<span class="hl-tag">${close}</span>`;
    });
}

// ─── MAIN ─────────────────────────────────────────────────────────────────────

let lastIssues = [];

function beautify() {
  const raw = document.getElementById('input').value.trim();
  if (!raw) { flashEmpty(); return; }

  const tokens = tokenize(raw);
  const { issues, statsRemoved, statsAdded } = auditTokens(tokens);
  lastIssues = issues;

  const formatted = formatHTML(tokens);
  const hl = highlight(formatted);

  // Output
  const codeEl = document.getElementById('output');
  codeEl.innerHTML = hl;

  // Line numbers
  const lines = formatted.split('\n');
  document.getElementById('line-nums').textContent = lines.map((_, i) => i + 1).join('\n');
  document.getElementById('out-lines').textContent = `${lines.length} lines`;

  // Stats
  document.getElementById('stat-removed').textContent = statsRemoved;
  document.getElementById('stat-added').textContent = statsAdded;
  document.getElementById('stat-issues').textContent = issues.length;

  // Badges
  const errors = issues.filter(i => i.level === 'error').length;
  const warns  = issues.filter(i => i.level === 'warn').length;
  const passes = issues.filter(i => i.level === 'pass').length;

  const be = document.getElementById('badge-errors');
  const bw = document.getElementById('badge-warns');
  const bp = document.getElementById('badge-passes');

  if (errors) { be.style.display = 'inline-flex'; be.textContent = `✖ ${errors} error${errors>1?'s':''}`; } else be.style.display = 'none';
  if (warns)  { bw.style.display = 'inline-flex'; bw.textContent = `⚠ ${warns} warning${warns>1?'s':''}`; } else bw.style.display = 'none';
  if (passes) { bp.style.display = 'inline-flex'; bp.textContent = `✔ ${passes} pass${passes>1?'es':''}`; } else bp.style.display = 'none';

  // WCAG panel
  renderWCAG(issues);
  document.getElementById('wcag-count').textContent = `${issues.length} checks`;

  // store formatted for copy
  window._lastFormatted = formatted;
}

function renderWCAG(issues) {
  const body = document.getElementById('wcag-body');
  if (!issues.length) { body.innerHTML = '<div class="wcag-empty">No issues found.</div>'; return; }

  const icons = { error: '✖', warn: '⚠', pass: '✔' };
  body.innerHTML = issues.map(i => `
    <div class="wcag-issue ${i.level}">
      <div class="wcag-issue-title">${icons[i.level]} ${i.title}</div>
      <div class="wcag-issue-ref">WCAG ${i.criterion}</div>
      <div class="wcag-issue-desc">${i.desc}</div>
    </div>
  `).join('');
}

function copyOutput() {
  const text = window._lastFormatted || '';
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = '✔ Copied!';
    setTimeout(() => btn.textContent = '⎘ Copy', 1500);
  });
}

function clearAll() {
  document.getElementById('input').value = '';
  document.getElementById('output').innerHTML = '';
  document.getElementById('line-nums').textContent = '1';
  document.getElementById('wcag-body').innerHTML = '<div class="wcag-empty">Paste HTML and click<br><strong>Beautify</strong> to audit</div>';
  document.getElementById('out-lines').textContent = '0 lines';
  document.getElementById('in-chars').textContent = '0 chars';
  ['badge-errors','badge-warns','badge-passes'].forEach(id => document.getElementById(id).style.display = 'none');
  ['stat-removed','stat-added','stat-issues'].forEach(id => document.getElementById(id).textContent = '0');
  document.getElementById('wcag-count').textContent = '—';
  window._lastFormatted = '';
}

function loadSample() {
  document.getElementById('input').value = `<!doctype html><html><head><meta charset=utf-8><title>Sample Page</title></head><body><h1>Welcome</h1><div onclick="doSomething()">Click me</div><img src="photo.jpg"><input type="email" required><a href="https://example.com" target="_blank">External link</a><h3>Skipped heading</h3><p>Hello world this is   a paragraph  with extra   spaces.</p><span id="dup">First</span><span id="dup">Second</span></body></html>`;
  updateInputStats();
  beautify();
}

function flashEmpty() {
  const ta = document.getElementById('input');
  ta.classList.add('flashing');
  setTimeout(() => ta.classList.remove('flashing'), 400);
}

function updateInputStats() {
  const v = document.getElementById('input').value;
  document.getElementById('in-chars').textContent = `${v.length} chars`;
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); beautify(); }
});
</script>
</body>
</html>
