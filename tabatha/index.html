<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Choose a version</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f5;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .wrapper {
        text-align: center;
      }

      h1 {
        font-size: 18px;
        font-weight: 500;
        color: #555;
        margin-bottom: 2rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .cards {
        display: flex;
        gap: 1.5rem;
      }

      .card {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 160px;
        height: 160px;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 12px;
        font-size: 64px;
        font-weight: 700;
        color: #333;
        text-decoration: none;
        transition:
          border-color 0.15s,
          transform 0.15s,
          box-shadow 0.15s;
      }

      .card:hover {
        border-color: #999;
        transform: translateY(-3px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <h1>Choose a version</h1>
      <div class="cards">
        <a class="card" href="a.html">A</a>
        <a class="card" href="b.html">B</a>
      </div>
    </div>
  </body>
</html>
